spring:
  application:
    name: fhir-hub
  datasource:
    url: ${FHIR_HUB_DB_URL:jdbc:postgresql://localhost:5432/fhirhub}
    username: ${FHIR_HUB_DB_USER:fhirhub}
    password: ${FHIR_HUB_DB_PASSWORD:fhirhub}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

fhir-hub:
  auth:
    # Loaded from FHIR_HUB_AUTH_TOKEN env var. NEVER log or echo this value.
    token: ${FHIR_HUB_AUTH_TOKEN:}

server:
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
